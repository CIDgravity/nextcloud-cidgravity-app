name: Lint and Build

on:
  pull_request:
    # `ready_for_review` is needed so the workflow fires the first time a
    # draft PR is promoted to ready. The job-level `if` below skips while
    # the PR is still in draft state.
    types: ['opened', 'edited', 'reopened', 'synchronize', 'ready_for_review']
  # Diagnostic: lets us trigger the workflow manually from the Actions tab
  # while we investigate why pull_request events aren't firing.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    name: Lint, stylelint and production build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Build (production bundle)
        run: npm run build
